<!DOCTYPE html>
<html>
<head>
  <title>Skittles Drag Game</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #fff7ad, #ffa9f9);
    }

    .tube-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }

    .tube {
      width: 70px;
      height: 200px;
      border: 3px solid #333;
      border-radius: 10px;
      display: flex;
      flex-direction: column-reverse;
      background: white;
    }

    .candy {
      height: 35px;
      border-radius: 6px;
      cursor: grab;
    }

    .red { background: crimson; }
    .yellow { background: gold; }
    .green { background: limegreen; }
    .purple { background: purple; }

    #win {
      display: none;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🍬 Skittles Drag & Sort</h1>

<div class="tube-row" id="game"></div>

<div id="win">
  <h2>🎉 You Win!</h2>
  <button onclick="restart()">Play Again</button>
</div>

<script>
const colors = ["red","yellow","green","purple"];
const capacity = 4;

let tubes = [];
let dragged = null;

function initGame() {
  let pool = [];

  colors.forEach(c => {
    for (let i = 0; i < capacity; i++) {
      pool.push(c);
    }
  });

  pool.sort(() => Math.random() - 0.5);

  tubes = Array.from({ length: 5 }, () => []);

  let i = 0;
  while (pool.length) {
    tubes[i % 4].push(pool.pop());
    i++;
  }

  render();
}

function render() {
  const game = document.getElementById("game");
  game.innerHTML = "";

  tubes.forEach((tube, ti) => {
    const div = document.createElement("div");
    div.className = "tube";

    div.ondragover = e => e.preventDefault();
    div.ondrop = () => drop(ti);

    tube.forEach((c, ci) => {
      const candy = document.createElement("div");
      candy.className = "candy " + c;
      candy.draggable = true;

      candy.ondragstart = () => {
        dragged = { color: c, fromTube: ti };
      };

      div.appendChild(candy);
    });

    game.appendChild(div);
  });

  checkWin();
}

function drop(toTube) {
  if (!dragged) return;

  const from = tubes[dragged.fromTube];
  const to = tubes[toTube];

  const candy = from[from.length - 1];

  if (from.length === 0) return;

  if (to.length < capacity &&
      (to.length === 0 || to[to.length - 1] === candy)) {
    from.pop();
    to.push(candy);
  }

  dragged = null;
  render();
}

function checkWin() {
  const win = tubes.every(t =>
    t.length === 0 || (t.length === capacity && t.every(c => c === t[0]))
  );

  if (win) {
    document.getElementById("win").style.display = "block";
  }
}

function restart() {
  document.getElementById("win").style.display = "none";
  initGame();
}

initGame();
</script>

</body>
</html>
