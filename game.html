<!DOCTYPE html>
<html>
<head>
  <title>Skittles Sorting Game</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>
  <h1>🍬 Skittles Sorting Game</h1>
  <p id="choice"></p>

  <div class="tube-row" id="game"></div>

  <div id="winScreen" style="display:none;">
    <h2>🎉 You sorted all the Skittles!</h2>
    <button onclick="restart()" class="btn">Play Again</button>
  </div>

  <script>
    const colors = ["red", "yellow", "green", "purple"];
    const capacity = 4;

    let tubes = [];
    let selected = null;

    function initGame() {
      let pool = [];

      colors.forEach(color => {
        for (let i = 0; i < capacity; i++) {
          pool.push(color);
        }
      });

      pool.sort(() => Math.random() - 0.5);

      tubes = Array.from({ length: 4 }, () => []);

      let i = 0;
      while (pool.length) {
        tubes[i % 5].push(pool.pop());
        i++;
      }

      render();
    }

    function render() {
      const game = document.getElementById("game");
      game.innerHTML = "";

      tubes.forEach((tube, i) => {
        const div = document.createElement("div");
        div.className = "tube";
        div.onclick = () => clickTube(i);

        tube.forEach(c => {
          const candy = document.createElement("div");
          candy.className = "candy " + c;
          div.appendChild(candy);
        });

        game.appendChild(div);
      });

      checkWin();
    }

    function clickTube(i) {
      if (selected === null) {
        selected = i;
      } else {
        if (selected !== i) {
          const from = tubes[selected];
          const to = tubes[i];

          if (from.length > 0 && to.length < capacity) {
            const candy = from.pop();
            to.push(candy);
          }
        }
        selected = null;
        render();
      }
    }

    function checkWin() {
      const win = tubes.every(tube => {
        if (tube.length === 0) return true;
        if (tube.length !== capacity) return false;
        return tube.every(c => c === tube[0]);
      });

      if (win) {
        document.getElementById("winScreen").style.display = "block";

        confetti({
          particleCount: 150,
          spread: 90,
          origin: { y: 0.6 }
        });
      }
    }

    function restart() {
      document.getElementById("winScreen").style.display = "none";
      selected = null;
      initGame();
    }

    initGame();
  </script>
</body>
</html>
