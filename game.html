<!DOCTYPE html>
<html>
<head>
  <title>Skittles Sorting Game</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #fff7ad, #ffa9f9);
    }

    .tube-row {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 40px;
    }

    .tube {
      width: 60px;
      height: 180px;
      border: 3px solid #333;
      border-radius: 10px;
      display: flex;
      flex-direction: column-reverse;
      background: white;
      cursor: pointer;
    }

    .candy {
      height: 35px;
      border-radius: 5px;
    }

    .red { background: crimson; }
    .yellow { background: gold; }
    .green { background: limegreen; }
    .purple { background: purple; }

    #win {
      display: none;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🍬 Skittles Sorting Game</h1>

<div class="tube-row" id="game"></div>

<div id="win">
  <h2>🎉 You Win!</h2>
  <button onclick="restart()">Play Again</button>
</div>

<script>
const colors = ["red","yellow","green","purple"];
const capacity = 4;

let tubes = [];
let selected = null;

function initGame() {
  let pool = [];

  colors.forEach(c => {
    for (let i = 0; i < capacity; i++) {
      pool.push(c);
    }
  });

  pool.sort(() => Math.random() - 0.5);

  tubes = Array.from({ length: 5 }, () => []);

  let i = 0;
  while (pool.length) {
    tubes[i % 4].push(pool.pop());
    i++;
  }

  render();
}

function render() {
  const game = document.getElementById("game");
  game.innerHTML = "";

  tubes.forEach((tube, i) => {
    const div = document.createElement("div");
    div.className = "tube";
    div.onclick = () => move(i);

    tube.forEach(c => {
      const candy = document.createElement("div");
      candy.className = "candy " + c;
      div.appendChild(candy);
    });

    game.appendChild(div);
  });

  checkWin();
}

function move(i) {
  if (selected === null) {
    selected = i;
    return;
  }

  if (selected !== i) {
    let from = tubes[selected];
    let to = tubes[i];

    if (from.length > 0 && to.length < capacity) {
      let candy = from[from.length - 1];

      if (to.length === 0 || to[to.length - 1] === candy) {
        from.pop();
        to.push(candy);
      }
    }
  }

  selected = null;
  render();
}

function checkWin() {
  const win = tubes.every(t =>
    t.length === 0 || (t.length === capacity && t.every(c => c === t[0]))
  );

  if (win) {
    document.getElementById("win").style.display = "block";
  }
}

function restart() {
  document.getElementById("win").style.display = "none";
  selected = null;
  initGame();
}

initGame();
</script>

</body>
</html>
