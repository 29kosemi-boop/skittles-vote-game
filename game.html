<script>
const colors = ["red","yellow","green","purple"];
const capacity = 4;

let tubes = [];
let selectedTube = null;

function initGame() {
  let pool = [];

  colors.forEach(c => {
    for (let i = 0; i < capacity; i++) {
      pool.push(c);
    }
  });

  pool.sort(() => Math.random() - 0.5);

  tubes = Array.from({ length: 5 }, () => []);

  let i = 0;
  while (pool.length) {
    tubes[i % 4].push(pool.pop());
    i++;
  }

  render();
}

function render() {
  const game = document.getElementById("game");
  game.innerHTML = "";

  tubes.forEach((tube, i) => {
    const div = document.createElement("div");
    div.className = "tube";

    if (selectedTube === i) {
      div.style.outline = "3px solid black";
    }

    div.onclick = () => handleClick(i);

    tube.forEach(c => {
      const candy = document.createElement("div");
      candy.className = "candy " + c;
      div.appendChild(candy);
    });

    game.appendChild(div);
  });

  checkWin();
}

function handleClick(i) {
  if (selectedTube === null) {
    // select source tube
    if (tubes[i].length === 0) return;
    selectedTube = i;
  } else {
    // move to target tube
    if (selectedTube !== i) {
      move(selectedTube, i);
    }
    selectedTube = null;
  }

  render();
}

function move(from, to) {
  const source = tubes[from];
  const target = tubes[to];

  if (source.length === 0) return;

  const candy = source[source.length - 1];

  if (
    target.length < capacity &&
    (target.length === 0 || target[target.length - 1] === candy)
  ) {
    source.pop();
    target.push(candy);
  }
}

function checkWin() {
  const win = tubes.every(t =>
    t.length === 0 || (t.length === capacity && t.every(c => c === t[0]))
  );

  if (win) {
    setTimeout(() => {
      alert("🎉 You sorted all Skittles!");
    }, 100);
  }
}

initGame();
</script>
